<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%231d7a6e'/%3E%3Cstop offset='1' stop-color='%23d08a2e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='4' y='4' width='56' height='56' rx='14' fill='url(%23g)'/%3E%3Ccircle cx='22' cy='28' r='6' fill='%23f4e5a6'/%3E%3Ccircle cx='34' cy='36' r='5' fill='%2386d2ff'/%3E%3Ccircle cx='42' cy='24' r='4' fill='%23d8f4ff'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>Particle Sandbox</h1>
      <p>The brush scatters particles. Switch materials and interaction modes.</p>

      <label for="material">Material</label>
      <select id="material">
        <option value="sand">Sand</option>
        <option value="water">Water</option>
        <option value="gas">Gas</option>
      </select>

      <label for="brushMode">Brush Mode</label>
      <select id="brushMode">
        <option value="repel">Repel</option>
        <option value="attract">Attract</option>
      </select>

      <label for="brushSize">Brush Size: <span id="brushSizeValue">26</span></label>
      <input id="brushSize" type="range" min="8" max="70" value="26">

      <label for="spawnRate">Intensity: <span id="spawnRateValue">38</span></label>
      <input id="spawnRate" type="range" min="8" max="80" value="38">

      <label for="windStrength">Wind Strength: <span id="windStrengthValue">0.00</span></label>
      <input id="windStrength" type="range" min="-1" max="1" step="0.02" value="0">

      <label class="inlineControl" for="heatMapToggle">
        <input id="heatMapToggle" type="checkbox">
        Heat Map (density)
      </label>

      <label for="organizeText">Word to Arrange</label>
      <input id="organizeText" type="text" maxlength="14" value="SAND">
      <button id="organizeBtn" type="button">Arrange as Word</button>
      <button id="freezeBtn" type="button">Freeze Time</button>

      <button id="clearBtn" type="button">Clear Scene</button>
      <div class="stats" id="stats">Particles: 0</div>
    </section>

    <section class="stageWrap">
      <canvas id="sandbox" aria-label="Particle simulation"></canvas>
      <div class="hint">LMB: brush interaction</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
