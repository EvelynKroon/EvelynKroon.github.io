<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toggle Themes with Sound</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --subtle: #9ca3af;
      --accent: #22d3ee;
      --ring: rgba(34, 211, 238, 0.35);
    }

    body.light {
      --bg: #f3efe4;
      --panel: #fff9ec;
      --text: #1f2937;
      --subtle: #5b6472;
      --accent: #ea580c;
      --ring: rgba(234, 88, 12, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(80vw 60vw at 10% 10%, rgba(34, 211, 238, 0.14), transparent 55%),
        radial-gradient(70vw 55vw at 90% 90%, rgba(251, 191, 36, 0.14), transparent 58%),
        var(--bg);
      color: var(--text);
      font-family: "Manrope", "Segoe UI", sans-serif;
      transition: background 260ms ease, color 260ms ease;
    }

    .card {
      width: min(700px, 92vw);
      padding: 34px;
      border-radius: 22px;
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
    }

    p {
      margin: 0 0 24px;
      color: var(--subtle);
      line-height: 1.6;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: var(--accent);
      color: #071018;
      cursor: pointer;
      box-shadow: 0 0 0 0 var(--ring);
      transition: transform 120ms ease, box-shadow 180ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 0 10px var(--ring);
    }

    button:active { transform: translateY(1px) scale(0.98); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Toggle Themes with Sound</h1>
    <p>Switch between dark and light modes. Each toggle plays a short pleasant click sound generated with Web Audio API.</p>
    <button id="toggleBtn">Switch Theme</button>
  </main>

  <script>
    const button = document.getElementById("toggleBtn");
    let audioCtx = null;

    function getContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playClick(isLight) {
      const ctx = getContext();
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      osc.type = isLight ? "triangle" : "square";
      osc.frequency.setValueAtTime(isLight ? 650 : 520, now);
      osc.frequency.exponentialRampToValueAtTime(isLight ? 430 : 360, now + 0.05);

      filter.type = "lowpass";
      filter.frequency.value = isLight ? 2200 : 1700;

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.14, now + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);

      osc.start(now);
      osc.stop(now + 0.1);
    }

    button.addEventListener("click", async () => {
      const toLight = !document.body.classList.contains("light");
      document.body.classList.toggle("light", toLight);

      try {
        const ctx = getContext();
        if (ctx.state === "suspended") await ctx.resume();
        playClick(toLight);
      } catch (_) {
        // Ignore audio errors if browser blocks sound.
      }
    });
  </script>
</body>
</html>
