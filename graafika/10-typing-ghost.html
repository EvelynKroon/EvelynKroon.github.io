<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Ghost</title>
  <style>
    :root {
      --bg: #fff7ed;
      --ink: #1f2937;
      --ghost: #9a3412;
      --panel: #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Nunito Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(75vw 60vw at 15% 10%, rgba(251, 146, 60, 0.18), transparent 55%),
        radial-gradient(65vw 60vw at 100% 100%, rgba(14, 165, 233, 0.16), transparent 60%),
        var(--bg);
      padding: 20px;
    }

    .wrap {
      width: min(860px, 94vw);
      display: grid;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4.8vw, 2.7rem);
    }

    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.2);
      padding: 14px;
      font-size: 1rem;
      font-family: inherit;
      background: var(--panel);
    }

    .ghost-output {
      min-height: 140px;
      border-radius: 14px;
      border: 1px dashed rgba(0, 0, 0, 0.28);
      background: rgba(255, 255, 255, 0.65);
      padding: 14px;
      line-height: 1.7;
      font-size: 1.05rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(12px);
      color: var(--ghost);
      animation: rise 320ms ease forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hint {
      margin: 0;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Typing Ghost</h1>
    <p class="hint">Type below. Letters appear with delay and softly rise from the bottom in the ghost preview.</p>
    <textarea id="input" placeholder="Start typing..."></textarea>
    <div class="ghost-output" id="output"></div>
  </main>

  <script>
    const input = document.getElementById("input");
    const output = document.getElementById("output");

    let renderVersion = 0;

    function renderGhost(text) {
      renderVersion++;
      const version = renderVersion;
      output.innerHTML = "";

      [...text].forEach((ch, i) => {
        setTimeout(() => {
          if (version !== renderVersion) return;

          if (ch === "\n") {
            output.appendChild(document.createElement("br"));
            return;
          }

          const span = document.createElement("span");
          span.className = "char";
          span.textContent = ch;
          output.appendChild(span);
        }, i * 42);
      });
    }

    input.addEventListener("input", () => {
      renderGhost(input.value);
    });
  </script>
</body>
</html>
