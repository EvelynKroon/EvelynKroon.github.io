<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hover Filter Swap</title>
  <style>
    :root {
      --bg: #0b1020;
      --ink: #ecfeff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Outfit", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(70vw 70vw at 85% 15%, rgba(168, 85, 247, 0.2), transparent 60%),
        radial-gradient(70vw 70vw at 10% 90%, rgba(56, 189, 248, 0.2), transparent 60%),
        var(--bg);
      padding: 20px;
    }

    .wrap {
      width: min(880px, 95vw);
      display: grid;
      gap: 16px;
    }

    h1 { margin: 0; font-size: clamp(1.6rem, 4.8vw, 2.6rem); }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    }

    .photo {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3);
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1) contrast(1.1);
      transition: filter 260ms ease, transform 260ms ease;
    }

    .photo:hover img {
      filter: invert(1) saturate(1.8) hue-rotate(160deg) contrast(1.2);
      transform: scale(1.04);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Hover Filter Swap</h1>
    <div class="grid">
      <figure class="photo">
        <img alt="Abstract one" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 540'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23f97316'/%3E%3Cstop offset='1' stop-color='%230c4a6e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='800' height='540' fill='url(%23g)'/%3E%3Cg fill='%23fff' fill-opacity='0.8'%3E%3Ccircle cx='150' cy='200' r='60'/%3E%3Ccircle cx='360' cy='140' r='46'/%3E%3Ccircle cx='650' cy='310' r='72'/%3E%3C/g%3E%3C/svg%3E" />
      </figure>
      <figure class="photo">
        <img alt="Abstract two" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 540'%3E%3Crect width='800' height='540' fill='%230f172a'/%3E%3Cg stroke='%23f8fafc' stroke-opacity='0.7' fill='none'%3E%3Cpath d='M60 420 C220 140 460 620 760 150' stroke-width='12'/%3E%3Cpath d='M10 260 C260 20 520 540 790 300' stroke-width='6'/%3E%3C/g%3E%3C/svg%3E" />
      </figure>
      <figure class="photo">
        <img alt="Abstract three" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 540'%3E%3Crect width='800' height='540' fill='%23065f46'/%3E%3Cg fill='%23fde68a' fill-opacity='0.85'%3E%3Cpolygon points='140,480 340,80 520,500'/%3E%3Cpolygon points='420,430 580,120 730,430'/%3E%3C/g%3E%3C/svg%3E" />
      </figure>
    </div>
  </main>
</body>
</html>
