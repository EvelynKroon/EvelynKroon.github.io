<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z-Index Shuffle</title>
  <style>
    :root {
      --bg: #0f172a;
      --ink: #e2e8f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(75vw 60vw at 20% 10%, rgba(56, 189, 248, 0.2), transparent 60%),
        radial-gradient(75vw 60vw at 85% 90%, rgba(167, 139, 250, 0.2), transparent 58%),
        var(--bg);
      color: var(--ink);
      font-family: "Rubik", "Segoe UI", sans-serif;
    }

    .hint {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 9999;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(15, 23, 42, 0.7);
      padding: 9px 12px;
      font-size: 13px;
    }

    .box {
      position: fixed;
      width: min(210px, 38vw);
      height: min(130px, 22vh);
      min-width: 130px;
      min-height: 78px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: grid;
      place-items: center;
      font-weight: 700;
      letter-spacing: 0.03em;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.32);
      -webkit-user-select: none;
      user-select: none;
      cursor: pointer;
      transition: transform 140ms ease;
    }

    .box:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="hint">Click any card: it jumps to front</div>

  <script>
    const specs = [
      [0.08, 0.2, "#22d3ee"],
      [0.24, 0.38, "#fb923c"],
      [0.41, 0.16, "#4ade80"],
      [0.58, 0.34, "#f472b6"],
      [0.72, 0.2, "#facc15"],
      [0.36, 0.52, "#a78bfa"]
    ];

    let zTop = specs.length + 2;
    const boxes = [];

    function placeBox(el, rx, ry) {
      const maxX = Math.max(0, window.innerWidth - el.offsetWidth);
      const maxY = Math.max(0, window.innerHeight - el.offsetHeight);
      el.style.left = Math.round(maxX * rx) + "px";
      el.style.top = Math.round(maxY * ry) + "px";
    }

    specs.forEach((s, i) => {
      const box = document.createElement("div");
      box.className = "box";
      box.textContent = "LAYER " + (i + 1);
      box.style.background = s[2];
      box.style.color = "#0b1020";
      box.style.zIndex = String(i + 1);

      box.addEventListener("click", () => {
        zTop += 1;
        box.style.zIndex = String(zTop);
      });

      document.body.appendChild(box);
      boxes.push({ el: box, rx: s[0], ry: s[1] });
    });

    function relayout() {
      for (const b of boxes) {
        placeBox(b.el, b.rx, b.ry);
      }
    }

    window.addEventListener("resize", relayout);
    relayout();
  </script>
</body>
</html>
