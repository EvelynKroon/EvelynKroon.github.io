<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hover Glitch Effect</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121826;
      --ink: #e6ecf2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Rajdhani", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(80vw 80vw at 85% 10%, rgba(20, 184, 166, 0.16), transparent 60%),
        radial-gradient(75vw 75vw at 15% 90%, rgba(239, 68, 68, 0.15), transparent 62%),
        var(--bg);
      overflow: hidden;
    }

    .wrap {
      width: min(840px, 92vw);
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4.2vw, 2.5rem);
    }

    .image-box {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: #0c111d;
      isolation: isolate;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      transform: scale(1);
      transition: transform 220ms ease, filter 220ms ease;
    }

    .image-box::before,
    .image-box::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      mix-blend-mode: screen;
      pointer-events: none;
      transition: opacity 120ms linear;
    }

    .image-box::before {
      background: repeating-linear-gradient(
        0deg,
        rgba(255, 0, 80, 0.15) 0 2px,
        rgba(0, 0, 0, 0) 2px 4px
      );
    }

    .image-box::after {
      background: linear-gradient(110deg, rgba(0, 255, 255, 0.12), rgba(255, 255, 0, 0.08));
    }

    .image-box:hover img {
      filter: contrast(1.2) saturate(1.4) hue-rotate(-16deg);
      transform: scale(1.03);
      animation: glitch 280ms steps(2, jump-none) infinite;
    }

    .image-box:hover::before,
    .image-box:hover::after {
      opacity: 1;
      animation: overlay-jump 210ms steps(2, jump-none) infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0, 0) scale(1.02); }
      20% { transform: translate(-2px, 1px) scale(1.03); }
      40% { transform: translate(2px, -1px) scale(1.03); }
      60% { transform: translate(-1px, 1px) scale(1.03); }
      80% { transform: translate(1px, -2px) scale(1.03); }
      100% { transform: translate(0, 0) scale(1.03); }
    }

    @keyframes overlay-jump {
      0% { transform: translate(0, 0); }
      50% { transform: translate(2px, -1px); }
      100% { transform: translate(-2px, 1px); }
    }

    p {
      margin: 0;
      opacity: 0.9;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Hover-Glitch Effect</h1>
    <div class="image-box">
      <img alt="Abstract generated art"
        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 700'%3E%3Cdefs%3E%3ClinearGradient id='g1' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230d9488'/%3E%3Cstop offset='1' stop-color='%23111827'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1200' height='700' fill='url(%23g1)'/%3E%3Cg fill='none' stroke='%23e5e7eb' stroke-opacity='0.75'%3E%3Cpath d='M100 560 Q340 120 650 340 T1120 180' stroke-width='8'/%3E%3Cpath d='M80 650 Q420 250 760 520 T1180 420' stroke-width='5'/%3E%3C/g%3E%3Cg fill='%23f59e0b' fill-opacity='0.9'%3E%3Ccircle cx='250' cy='210' r='34'/%3E%3Ccircle cx='920' cy='280' r='26'/%3E%3C/g%3E%3C/svg%3E" />
    </div>
    <p>Hover over the image to trigger subtle shaking and color-shift glitch behavior.</p>
  </main>
</body>
</html>
